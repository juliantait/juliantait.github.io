<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>oTree preview — main</title>
  <style>
    :root {
      --color-background: #ffffff;
      --color-page-bg: #f5f7fa;
      --color-text: #555;
      --color-heading: #333;
      --color-accent: #4caf50;
      --color-border: #ccc;
      --color-primary: #008cba;
      --color-primary-hover: #007bb5;
      --color-table-header: #f5f5f5;
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: var(--color-page-bg);
      font-family: "Inter", "Segoe UI", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      color: var(--color-text);
      line-height: 1.6;
    }
    .scale-wrapper {
      width: 1280px;
      height: 720px;
      transform-origin: top left;
      transform: scale(min(calc(100vw / 1280), calc(100vh / 720)));
    }
    h1, h2, h3 { color: var(--color-heading); }
    p { margin: 0 0 16px; font-size: 22px; }
    strong { color: var(--color-accent); }
    .experimental-screen {
      width: 1280px;
      height: 720px;
      box-sizing: border-box;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: var(--color-page-bg);
      text-align: center;
    }
    .experimental-screen, .experimental-screen * { text-align: center; }
    .screen-card {
      width: 960px;
      max-width: 960px;
      min-height: 540px;
      box-sizing: border-box;
      margin-inline: auto;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.06);
      padding: 32px 36px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .experimental-header { display: flex; flex-direction: column; gap: 8px; align-items: center; }
    .header-title {
      margin: 0;
      font-size: 35px;
      color: var(--color-heading);
      font-weight: 700;
    }
    .experimental-content {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1 1 auto;
      align-items: center;
      justify-content: center;
    }
    .section-text { max-width: 75%; margin: 0 auto; font-size: 22px; }
    .button-row {
      margin-top: auto;
      padding-top: 24px;
      display: flex;
      justify-content: center;
      gap: 12px;
    }
    .next-button {
      display: inline-block;
      border: none;
      color: white;
      padding: 15px 32px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 8px;
      background-color: var(--color-primary);
    }
    .next-button:hover { background-color: var(--color-primary-hover); }

    .payoff-matrix {
      border-collapse: collapse;
      margin: 4px auto 8px;
      font-size: 18px;
    }
    .payoff-matrix th,
    .payoff-matrix td {
      border: 1px solid #ddd;
      padding: 10px 18px;
      text-align: center;
    }
    .payoff-matrix th {
      background-color: var(--color-table-header);
      color: var(--color-heading);
      font-weight: 600;
    }
    .payoff-matrix caption {
      caption-side: top;
      font-size: 16px;
      color: var(--color-text);
      padding-bottom: 4px;
    }

    .stacked-form {
      width: 100%;
      max-width: 460px;
      margin: 8px auto 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: stretch;
    }
    .choice-option {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 22px;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      transition: border-color 0.15s ease, background-color 0.15s ease;
      text-align: left;
      font-size: 20px;
    }
    .choice-option:hover { border-color: var(--color-primary); background: #f6fbfd; }
    .choice-option input[type="radio"] { margin: 0; transform: scale(1.4); }
    .choice-label { font-weight: 600; color: var(--color-heading); }
  </style>
</head>
<body>
  <div class="scale-wrapper">
    <div class="experimental-screen">
      <div class="screen-card">
        <div class="experimental-header">
          <h2 class="header-title">Round 3</h2>
        </div>
        <div class="experimental-content">
          <div class="section-text">
            You are the row player. Choose your move.
          </div>

          <table class="payoff-matrix">
            <caption>Payoffs (row player, column player)</caption>
            <thead>
              <tr>
                <th></th>
                <th>Column: Stag</th>
                <th>Column: Hare</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <th>Row: Stag</th>
                <td>4, 4</td>
                <td>0, 3</td>
              </tr>
              <tr>
                <th>Row: Hare</th>
                <td>3, 0</td>
                <td>3, 3</td>
              </tr>
            </tbody>
          </table>

          <div class="stacked-form">
            <label class="choice-option">
              <input type="radio" name="choice" value="stag">
              <span class="choice-label">Stag</span>
            </label>
            <label class="choice-option">
              <input type="radio" name="choice" value="hare">
              <span class="choice-label">Hare</span>
            </label>
          </div>
        </div>
        <div class="button-row">
          <button type="button" class="next-button">Submit</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
