<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>Redirecting...</title>
<script>
(function() {
  var path = location.pathname.replace(/^\/+|\/+$/g, "").toLowerCase();
  var map = {
    "creed": "/CREED",
    "creed.html": "/CREED.html",
    "creed_lab": "/CREED_lab/",
    "creedlab": "/CREED_lab/"
  };
  if (map[path]) {
    location.replace(map[path] + location.search + location.hash);
  }
})();
</script>
</head><body>
<h1>404 — Page not found</h1>
<p><a href="/">Return home</a></p>
</body></html>
